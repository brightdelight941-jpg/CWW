<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Connect World Wide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#14161a;
    --bg-elev:#1c1f25;
    --bg-elev-2:#242830;
    --line:#2c313a;
    --text:#f2f1ed;
    --text-dim:#9a9fab;
    --accent:#5b8def;
    --accent-2:#f2b880;
    --bubble-me:#3a5fc4;
    --bubble-them:#232730;
    --danger:#e2645a;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  h1,h2,h3,.brand{font-family:'Sora',sans-serif;}
  button{font-family:inherit;}
  input,textarea{font-family:inherit;}
  #app{height:100vh; display:flex; flex-direction:column;}

  /* ---------- Auth ---------- */
  .auth-wrap{
    height:100%; display:flex; flex-direction:column; justify-content:center;
    padding:32px 24px; max-width:420px; margin:0 auto; width:100%;
  }
  .brand{
    font-size:13px; letter-spacing:0.04em; text-transform:uppercase;
    color:var(--accent-2); margin-bottom:6px; font-weight:700;
  }
  .auth-wrap h1{font-size:32px; margin:0 0 8px; line-height:1.1;}
  .auth-sub{color:var(--text-dim); font-size:14px; margin-bottom:28px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; letter-spacing:0.03em;}
  .field input{
    width:100%; padding:13px 14px; border-radius:12px; border:1px solid var(--line);
    background:var(--bg-elev); color:var(--text); font-size:15px; outline:none;
  }
  .field input:focus{border-color:var(--accent);}
  .btn{
    width:100%; padding:14px; border-radius:12px; border:none; font-weight:600;
    font-size:15px; cursor:pointer; margin-top:4px;
  }
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:active{opacity:0.85;}
  .btn-primary:disabled{opacity:0.5;}
  .switch-link{
    text-align:center; margin-top:18px; color:var(--text-dim); font-size:14px;
  }
  .switch-link a{color:var(--accent-2); text-decoration:none; font-weight:600;}
  .auth-error{
    background:rgba(226,100,90,0.12); border:1px solid rgba(226,100,90,0.4);
    color:#ffb3ac; padding:10px 12px; border-radius:10px; font-size:13px; margin-bottom:14px;
  }

  /* ---------- Top bar (shared) ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px; border-bottom:1px solid var(--line); flex-shrink:0;
    background:var(--bg);
  }
  .topbar .brand{margin:0;}
  .icon-btn{
    background:var(--bg-elev); border:1px solid var(--line); color:var(--text);
    width:38px; height:38px; border-radius:10px; display:flex; align-items:center;
    justify-content:center; font-size:18px; cursor:pointer;
  }

  /* ---------- Chat list ---------- */
  #list-view{display:flex; flex-direction:column; height:100%;}
  .list-scroll{flex:1; overflow-y:auto; padding:6px 10px;}
  .chat-row{
    display:flex; align-items:center; gap:12px; padding:12px 10px; border-radius:14px;
    cursor:pointer;
  }
  .chat-row:active{background:var(--bg-elev);}
  .avatar{
    width:48px; height:48px; border-radius:50%; background:var(--bg-elev-2);
    display:flex; align-items:center; justify-content:center; font-weight:700;
    color:var(--accent-2); flex-shrink:0; font-size:17px; overflow:hidden;
  }
  .avatar img{width:100%; height:100%; object-fit:cover;}
  .chat-meta{flex:1; min-width:0;}
  .chat-name{font-weight:600; font-size:15.5px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .chat-preview{color:var(--text-dim); font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .empty-state{
    text-align:center; color:var(--text-dim); padding:60px 24px; font-size:14px; line-height:1.6;
  }
  .fab{
    position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%;
    background:var(--accent); color:#fff; border:none; font-size:26px; cursor:pointer;
    box-shadow:0 8px 20px rgba(91,141,239,0.4); z-index:20;
  }

  /* ---------- Chat window ---------- */
  #chat-view{display:none; flex-direction:column; height:100%;}
  #chat-view.active{display:flex;}
  #list-view.hidden{display:none;}
  .chat-header{
    display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .chat-header .chat-name{font-size:16px;}
  .msgs{flex:1; overflow-y:auto; padding:16px 14px; display:flex; flex-direction:column; gap:10px;}
  .msg-row{display:flex; max-width:80%;}
  .msg-row.me{align-self:flex-end; justify-content:flex-end;}
  .msg-row.them{align-self:flex-start;}
  .bubble{
    padding:10px 14px; border-radius:18px; font-size:15px; line-height:1.4; word-wrap:break-word;
  }
  .msg-row.me .bubble{background:var(--bubble-me); color:#fff; border-bottom-right-radius:5px;}
  .msg-row.them .bubble{background:var(--bubble-them); border-bottom-left-radius:5px;}
  .bubble img{max-width:220px; border-radius:12px; display:block; margin-top:2px;}
  .bubble audio{margin-top:2px; max-width:220px;}
  .msg-sender{font-size:11px; color:var(--accent-2); margin-bottom:3px; font-weight:600;}
  .composer{
    display:flex; align-items:center; gap:8px; padding:10px 12px; border-top:1px solid var(--line);
    flex-shrink:0; background:var(--bg);
  }
  .composer input[type=text]{
    flex:1; padding:12px 14px; border-radius:20px; border:1px solid var(--line);
    background:var(--bg-elev); color:var(--text); font-size:15px; outline:none;
  }
  .composer .icon-btn{flex-shrink:0;}
  .icon-btn.recording{background:var(--danger); border-color:var(--danger); color:#fff;}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); display:none;
    align-items:flex-end; z-index:50;
  }
  .modal-overlay.active{display:flex;}
  .modal{
    background:var(--bg-elev); width:100%; border-radius:20px 20px 0 0; padding:22px 20px 26px;
    max-height:82vh; overflow-y:auto;
  }
  .modal h2{margin:0 0 16px; font-size:19px;}
  .modal .field input{background:var(--bg-elev-2);}
  .user-pick-row{
    display:flex; align-items:center; gap:12px; padding:10px 6px; border-radius:12px; cursor:pointer;
  }
  .user-pick-row.selected{background:rgba(91,141,239,0.15);}
  .close-modal{background:none; border:none; color:var(--text-dim); font-size:14px; margin-top:10px; width:100%; padding:8px; cursor:pointer;}
  .modal-tabs{display:flex; gap:8px; margin-bottom:16px;}
  .modal-tab{
    flex:1; padding:9px; border-radius:10px; border:1px solid var(--line); background:transparent;
    color:var(--text-dim); font-size:13.5px; font-weight:600; cursor:pointer;
  }
  .modal-tab.active{background:var(--accent); color:#fff; border-color:var(--accent);}

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    display:flex; border-top:1px solid var(--line); background:var(--bg); flex-shrink:0;
  }
  .nav-btn{
    flex:1; background:none; border:none; color:var(--text-dim); padding:10px 0 8px;
    display:flex; flex-direction:column; align-items:center; gap:2px; font-size:11px;
    font-weight:600; cursor:pointer;
  }
  .nav-btn .nav-icon{font-size:20px;}
  .nav-btn.active{color:var(--accent);}

  /* ---------- Feed ---------- */
  #feed-view{display:none; flex-direction:column; height:100%;}
  #feed-view.active{display:flex;}
  .feed-scroll{flex:1; overflow-y:auto; padding:10px 12px 90px;}
  .post-card{
    background:var(--bg-elev); border:1px solid var(--line); border-radius:16px;
    padding:14px; margin-bottom:14px;
  }
  .post-head{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .post-head .avatar{width:36px; height:36px; font-size:14px;}
  .post-username{font-weight:600; font-size:14.5px;}
  .post-time{font-size:11.5px; color:var(--text-dim);}
  .post-content{font-size:14.5px; line-height:1.5; margin-bottom:10px; white-space:pre-wrap;}
  .post-media img, .post-media video{
    width:100%; border-radius:12px; max-height:420px; object-fit:cover; display:block;
  }
  .post-delete{
    background:none; border:none; color:var(--text-dim); font-size:18px; margin-left:auto; cursor:pointer;
  }
  .new-post-fab{
    position:fixed; bottom:80px; right:24px; width:56px; height:56px; border-radius:50%;
    background:var(--accent-2); color:#1c1300; border:none; font-size:24px; cursor:pointer;
    box-shadow:0 8px 20px rgba(242,184,128,0.35); z-index:20;
  }
  #new-post-text{
    width:100%; min-height:100px; padding:12px 14px; border-radius:12px; border:1px solid var(--line);
    background:var(--bg-elev-2); color:var(--text); font-size:15px; outline:none; resize:vertical;
  }
  .post-media-preview{margin-top:10px; position:relative;}
  .post-media-preview img, .post-media-preview video{width:100%; border-radius:12px; max-height:260px; object-fit:cover;}
  .post-media-actions{display:flex; gap:10px; margin-top:12px;}
  .post-media-actions .icon-btn{width:auto; padding:0 14px; gap:6px; font-size:14px;}
</style>
</head>
<body>

<div id="app">

  <!-- AUTH VIEW -->
  <div id="auth-view">
    <div class="auth-wrap">
      <div class="brand">Connect World Wide</div>
      <h1 id="auth-title">Welcome back</h1>
      <div class="auth-sub" id="auth-sub">Sign in to keep talking.</div>
      <div id="auth-error" class="auth-error" style="display:none;"></div>
      <div class="field" id="username-field" style="display:none;">
        <label>Username</label>
        <input id="in-username" type="text" placeholder="e.g. maria_k" autocomplete="off" />
      </div>
      <div class="field">
        <label>Email</label>
        <input id="in-email" type="email" placeholder="you@example.com" autocomplete="off" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="in-password" type="password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" id="btn-auth-submit">Sign in</button>
      <div class="switch-link">
        <span id="switch-text">Don't have an account?</span>
        <a href="#" id="switch-link">Create one</a>
      </div>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div id="list-view" style="display:none; flex-direction:column; height:100%;">
    <div class="topbar">
      <div class="brand">Connect World Wide</div>
      <div style="display:flex; gap:8px;">
        <button class="icon-btn" id="btn-profile" title="Profile">👤</button>
        <button class="icon-btn" id="btn-logout" title="Sign out">⏻</button>
      </div>
    </div>
    <div class="list-scroll" id="chat-list" style="flex:1;"></div>
    <button class="fab" id="btn-new-chat">＋</button>
    <div class="bottom-nav">
      <button class="nav-btn active" id="nav-chats"><span class="nav-icon">💬</span>Chats</button>
      <button class="nav-btn" id="nav-feed"><span class="nav-icon">🌐</span>Feed</button>
    </div>
  </div>

  <!-- FEED VIEW -->
  <div id="feed-view">
    <div class="topbar">
      <div class="brand">Feed</div>
      <div style="display:flex; gap:8px;">
        <button class="icon-btn" id="btn-profile-2" title="Profile">👤</button>
        <button class="icon-btn" id="btn-logout-2" title="Sign out">⏻</button>
      </div>
    </div>
    <div class="feed-scroll" id="feed-list"></div>
    <button class="new-post-fab" id="btn-new-post">＋</button>
    <div class="bottom-nav">
      <button class="nav-btn" id="nav-chats-2"><span class="nav-icon">💬</span>Chats</button>
      <button class="nav-btn active" id="nav-feed-2"><span class="nav-icon">🌐</span>Feed</button>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div id="chat-view">
    <div class="chat-header">
      <button class="icon-btn" id="btn-back">←</button>
      <div class="avatar" id="chat-header-avatar">•</div>
      <div class="chat-name" id="chat-header-name" style="flex:1;">Chat</div>
      <button class="icon-btn" id="btn-add-people" style="display:none;" title="Add people">➕</button>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="composer">
      <button class="icon-btn" id="btn-attach" title="Photo">📷</button>
      <input type="file" id="file-input" accept="image/*" style="display:none;" />
      <input type="text" id="msg-input" placeholder="Message" autocomplete="off" />
      <button class="icon-btn" id="btn-mic" title="Voice note">🎙️</button>
      <button class="icon-btn" id="btn-send" title="Send" style="background:var(--accent); border-color:var(--accent); color:#fff;">➤</button>
    </div>
  </div>

</div>

<!-- New chat modal -->
<div class="modal-overlay" id="new-chat-modal">
  <div class="modal">
    <h2>Start a conversation</h2>
    <div class="modal-tabs">
      <button class="modal-tab active" data-mode="direct">Direct message</button>
      <button class="modal-tab" data-mode="group">New group</button>
    </div>
    <div class="field">
      <label>Search by username</label>
      <input id="user-search" type="text" placeholder="Type a username..." autocomplete="off" />
    </div>
    <div id="user-results"></div>
    <div class="field" id="group-name-field" style="display:none; margin-top:10px;">
      <label>Group name</label>
      <input id="group-name" type="text" placeholder="e.g. Weekend Trip" />
    </div>
    <button class="btn btn-primary" id="btn-create-chat" style="margin-top:16px;">Start chat</button>
    <button class="close-modal" id="close-new-chat">Cancel</button>
  </div>
</div>

<!-- Add people modal -->
<div class="modal-overlay" id="add-people-modal">
  <div class="modal">
    <h2>Add people</h2>
    <div class="field">
      <label>Search by username</label>
      <input id="add-people-search" type="text" placeholder="Type a username..." autocomplete="off" />
    </div>
    <div id="add-people-results"></div>
    <button class="btn btn-primary" id="btn-confirm-add-people" style="margin-top:16px;">Add to group</button>
    <button class="close-modal" id="close-add-people">Cancel</button>
  </div>
</div>

<!-- New post modal -->
<div class="modal-overlay" id="new-post-modal">
  <div class="modal">
    <h2>Create a post</h2>
    <textarea id="new-post-text" placeholder="What's on your mind?"></textarea>
    <div class="post-media-preview" id="new-post-preview" style="display:none;"></div>
    <input type="file" id="post-media-input" accept="image/*,video/*" style="display:none;" />
    <div class="post-media-actions">
      <button class="icon-btn" id="btn-post-attach">📷 Add photo/video</button>
    </div>
    <button class="btn btn-primary" id="btn-submit-post" style="margin-top:16px;">Post</button>
    <button class="close-modal" id="close-new-post">Cancel</button>
  </div>
</div>

<!-- Profile modal -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal">
    <h2>Your profile</h2>
    <div style="display:flex; justify-content:center; margin-bottom:16px;">
      <div class="avatar" id="profile-avatar-preview" style="width:76px; height:76px; font-size:26px;">•</div>
    </div>
    <input type="file" id="avatar-input" accept="image/*" style="display:none;" />
    <button class="btn" id="btn-change-avatar" style="background:var(--bg-elev-2); color:var(--text); margin-bottom:14px;">Change photo</button>
    <div class="field">
      <label>Username</label>
      <input id="profile-username" type="text" />
    </div>
    <button class="btn btn-primary" id="btn-save-profile">Save</button>
    <button class="close-modal" id="close-profile">Close</button>
  </div>
</div>

<script>
/* ================= CONFIG ================= */
const SUPABASE_URL = "https://qnqterqqztfemfkmrwry.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFucXRlcnFxenRmZW1ma21yd3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NzM0MDcsImV4cCI6MjA5OTM0OTQwN30.o0iKHvC4sh503PE05TJve2o2uR65mdwA4BOwBPZbkPc";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ================= STATE ================= */
let currentUser = null;
let currentProfile = null;
let activeChatId = null;
let activeChatMeta = null;
let msgChannel = null;
let isSignUpMode = false;
let selectedUserIds = new Set();
let mediaRecorder = null;
let recordedChunks = [];

/* ================= HELPERS ================= */
const $ = (id) => document.getElementById(id);
function initials(name){ return (name||'?').trim().charAt(0).toUpperCase(); }
function show(el){
  if(el.classList.contains('modal-overlay')){
    el.classList.add('active');
  } else if(el.id === 'list-view'){
    el.style.display = 'flex';
  } else {
    el.style.display = '';
  }
}
function hide(el){
  if(el.classList.contains('modal-overlay')){
    el.classList.remove('active');
  } else {
    el.style.display = 'none';
  }
}

/* ================= AUTH ================= */
$('switch-link').onclick = (e) => {
  e.preventDefault();
  isSignUpMode = !isSignUpMode;
  if(isSignUpMode){
    $('auth-title').textContent = 'Create an account';
    $('auth-sub').textContent = 'Pick a username to get started.';
    show($('username-field'));
    $('btn-auth-submit').textContent = 'Create account';
    $('switch-text').textContent = 'Already have an account?';
    $('switch-link').textContent = 'Sign in';
  } else {
    $('auth-title').textContent = 'Welcome back';
    $('auth-sub').textContent = 'Sign in to keep talking.';
    hide($('username-field'));
    $('btn-auth-submit').textContent = 'Sign in';
    $('switch-text').textContent = "Don't have an account?";
    $('switch-link').textContent = 'Create one';
  }
  hide($('auth-error'));
};

$('btn-auth-submit').onclick = async () => {
  const email = $('in-email').value.trim();
  const password = $('in-password').value;
  const username = $('in-username').value.trim();
  hide($('auth-error'));

  if(!email || !password || (isSignUpMode && !username)){
    showAuthError('Please fill in all fields.');
    return;
  }

  $('btn-auth-submit').disabled = true;
  try{
    if(isSignUpMode){
      const { data, error } = await sb.auth.signUp({ email, password });
      if(error) throw error;
      if(data.user){
        const { error: profileError } = await sb.from('profiles').insert({
          id: data.user.id,
          username: username,
          status: 'online'
        });
        if(profileError) throw profileError;
      }
      if(!data.session){
        showAuthError('Account created — check your email to confirm, then sign in.');
        $('btn-auth-submit').disabled = false;
        return;
      }
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error) throw error;
    }
  } catch(err){
    showAuthError(err.message || 'Something went wrong.');
  }
  $('btn-auth-submit').disabled = false;
};

function showAuthError(msg){
  $('auth-error').textContent = msg;
  show($('auth-error'));
}

$('btn-logout').onclick = async () => {
  await sb.auth.signOut();
};

sb.auth.onAuthStateChange((event, session) => {
  if(session && session.user){
    currentUser = session.user;
    loadProfileAndEnterApp();
  } else {
    currentUser = null;
    currentProfile = null;
    hide($('list-view')); $('chat-view').classList.remove('active');
    show($('auth-view'));
  }
});

async function loadProfileAndEnterApp(){
  const { data, error } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  if(!error && data){
    currentProfile = data;
  }
  hide($('auth-view'));
  show($('list-view'));
  loadChats();
  subscribeToOwnChats();
}

/* ================= BOTTOM NAV ================= */
function goToChatsTab(){
  hide($('feed-view'));
  $('feed-view').classList.remove('active');
  $('list-view').style.display = 'flex';
}
function goToFeedTab(){
  $('list-view').style.display = 'none';
  $('feed-view').classList.add('active');
  loadFeed();
}
$('nav-chats').onclick = goToChatsTab;
$('nav-chats-2').onclick = goToChatsTab;
$('nav-feed').onclick = goToFeedTab;
$('nav-feed-2').onclick = goToFeedTab;
$('btn-profile-2').onclick = () => $('btn-profile').onclick();
$('btn-logout-2').onclick = () => $('btn-logout').onclick();

/* ================= FEED ================= */
async function loadFeed(){
  $('feed-list').innerHTML = `<div class="empty-state">Loading...</div>`;
  const { data: posts, error } = await sb
    .from('posts')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(50);

  if(error || !posts || posts.length === 0){
    $('feed-list').innerHTML = `<div class="empty-state">No posts yet.<br>Be the first to share something.</div>`;
    return;
  }

  const cards = [];
  for(const post of posts){
    const { data: author } = await sb.from('profiles').select('username, avatar_url').eq('id', post.user_id).single();
    const name = author?.username || 'User';
    const avatarUrl = author?.avatar_url;
    let mediaHtml = '';
    if(post.media_url && post.media_type === 'image'){
      mediaHtml = `<div class="post-media"><img src="${post.media_url}"></div>`;
    } else if(post.media_url && post.media_type === 'video'){
      mediaHtml = `<div class="post-media"><video src="${post.media_url}" controls playsinline></video></div>`;
    }
    const timeStr = formatPostTime(post.created_at);
    const isMine = post.user_id === currentUser.id;
    cards.push(`
      <div class="post-card">
        <div class="post-head">
          <div class="avatar">${avatarUrl ? `<img src="${avatarUrl}">` : initials(name)}</div>
          <div>
            <div class="post-username">${escapeHtml(name)}</div>
            <div class="post-time">${timeStr}</div>
          </div>
          ${isMine ? `<button class="post-delete" data-post-id="${post.id}">✕</button>` : ''}
        </div>
        ${post.content ? `<div class="post-content">${escapeHtml(post.content)}</div>` : ''}
        ${mediaHtml}
      </div>
    `);
  }
  $('feed-list').innerHTML = cards.join('');

  document.querySelectorAll('.post-delete').forEach(btn => {
    btn.onclick = async () => {
      if(!confirm('Delete this post?')) return;
      await sb.from('posts').delete().eq('id', btn.dataset.postId);
      loadFeed();
    };
  });
}

function formatPostTime(ts){
  const d = new Date(ts);
  const diffMs = Date.now() - d.getTime();
  const mins = Math.floor(diffMs / 60000);
  if(mins < 1) return 'just now';
  if(mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if(days < 7) return `${days}d ago`;
  return d.toLocaleDateString();
}

let selectedPostFile = null;
$('btn-new-post').onclick = () => {
  $('new-post-text').value = '';
  $('new-post-preview').style.display = 'none';
  $('new-post-preview').innerHTML = '';

  show($('new-post-modal'));

$('close-new-post').onclick = () => hide($('new-post-modal'));

$('btn-post-attach').onclick = () => $('post-media-input').click();
$('post-media-input').onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  selectedPostFile = file;

  reader.onload = () => {

$('btn-submit-post').onclick = async () => {

    return;
  }
  $('btn-submit-post').disabled = true;

  let mediaUrl = null;
  let mediaType = null;
  try{
    if(selectedPostFile){
      mediaType = selectedPostFile.type.startsWith('video') ? 'video' : 'image';
      const path = `${currentUser.id}/${Date.now()}_${selectedPostFile.name}`;

      mediaUrl = urlData.publicUrl;

    });

/* ================= CHAT LIST ================= */
async function loadChats(){
  const { data: participantRows, error } = await sb
    .from('chat_participant')
    .select('chat_id')
    .eq('user_id', currentUser.id);

  if(error || !participantRows || participantRows.length === 0){
    $('chat-list').innerHTML = `<div class="empty-state">No conversations yet.<br>Tap + to start chatting.</div>`;
    return;
  }

  const chatIds = participantRows.map(r => r.chat_id);
  const { data: chats } = await sb
    .from('chats')
    .select('*')
    .in('id', chatIds)
    .order('created_at', { ascending: false });

  if(!chats || chats.length === 0){
    $('chat-list').innerHTML = `<div class="empty-state">No conversations yet.<br>Tap + to start chatting.</div>`;
    return;
  }

  const rowsHtml = [];
  for(const chat of chats){
    const meta = await getChatDisplayMeta(chat);
    const { data: lastMsgArr } = await sb
      .from('messages')
      .select('content, type, created_at')
      .eq('chat_id', chat.id)
      .order('created_at', { ascending: false })
      .limit(1);
    const lastMsg = lastMsgArr && lastMsgArr[0];
    let preview = 'Say hello 👋';
    if(lastMsg){
      if(lastMsg.type === 'image') preview = '📷 Photo';
      else if(lastMsg.type === 'voice') preview = '🎙️ Voice note';
      else preview = lastMsg.content || '';
    }
    rowsHtml.push(`
      <div class="chat-row" data-chat-id="${chat.id}">
        <div class="avatar">${meta.avatarUrl ? `<img src="${meta.avatarUrl}">` : initials(meta.name)}</div>
        <div class="chat-meta">
          <div class="chat-name">${escapeHtml(meta.name)}</div>
          <div class="chat-preview">${escapeHtml(preview)}</div>
        </div>
      </div>
    `);
  }
  $('chat-list').innerHTML = rowsHtml.join('');
  document.querySelectorAll('.chat-row').forEach(row => {
    row.onclick = () => openChat(row.dataset.chatId);
  });
}

async function getChatDisplayMeta(chat){
  if(chat.is_group){
    return { name: chat.group_name || 'Group chat', avatarUrl: chat.group_avatar_url };
  }
  const { data: participants } = await sb
    .from('chat_participant')
    .select('user_id')
    .eq('chat_id', chat.id);
  const otherId = participants && participants.find(p => p.user_id !== currentUser.id)?.user_id;
  if(!otherId) return { name: 'Chat', avatarUrl: null };
  const { data: otherProfile } = await sb.from('profiles').select('username, avatar_url').eq('id', otherId).single();
  return { name: otherProfile?.username || 'User', avatarUrl: otherProfile?.avatar_url };
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function subscribeToOwnChats(){
  sb.channel('chat-list-updates')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
      loadChats();
    })
    .subscribe();
}

  clearTimeout(searchTimeout);

async function searchUsers(){
  const term = $('user-search').value.trim();
  if(!term){ $('user-results').innerHTML=''; return; }
  const { data: users } = await sb
    .from('profiles')
    .select('id, username, avatar_url')
    .ilike('username', `%${term}%`)
    .neq('id', currentUser.id)
    .limit(15);

  if(!users || users.length === 0){
    $('user-results').innerHTML = `<div class="empty-state" style="padding:20px;">No users found.</div>`;
    return;
  }

  $('user-results').innerHTML = users.map(u => `
    <div class="user-pick-row ${selectedUserIds.has(u.id) ? 'selected' : ''}" data-user-id="${u.id}">
      <div class="avatar">${u.avatar_url ? `<img src="${u.avatar_url}">` : initials(u.username)}</div>
      <div class="chat-name">${escapeHtml(u.username)}</div>
    </div>
  `).join('');

  document.querySelectorAll('.user-pick-row').forEach(row => {
    row.onclick = () => {
      const uid = row.dataset.userId;
      if(newChatMode === 'direct'){
        selectedUserIds.clear();
        document.querySelectorAll('.user-pick-row').forEach(r => r.classList.remove('selected'));
        selectedUserIds.add(uid);
        row.classList.add('selected');
      } else {
        if(selectedUserIds.has(uid)){
          selectedUserIds.delete(uid);
          row.classList.remove('selected');
        } else {
          selectedUserIds.add(uid);
          row.classList.add('selected');
        }
      }
    };
  });
}

$('btn-create-chat').onclick = async () => {
  if(selectedUserIds.size === 0){
    alert('Pick at least one person.');
    return;
  }
  if(newChatMode === 'group' && !$('group-name').value.trim()){
    alert('Give your group a name.');
    return;
  }

  if(newChatMode === 'direct'){
    const otherId = [...selectedUserIds][0];
    const existingChatId = await findExistingDirectChat(otherId);
    if(existingChatId){
      hide($('new-chat-modal'));
      openChat(existingChatId);
      return;
    }
    const { data: chat, error } = await sb.from('chats').insert({
      is_group: false, created_by: currentUser.id
    }).select().single();
    if(error){ alert(error.message); return; }
    await sb.from('chat_participant').insert([
      { chat_id: chat.id, user_id: currentUser.id },
      { chat_id: chat.id, user_id: otherId }
    ]);
    hide($('new-chat-modal'));
    loadChats();
    openChat(chat.id);
  } else {
    const { data: chat, error } = await sb.from('chats').insert({
      is_group: true, group_name: $('group-name').value.trim(), created_by: currentUser.id
    }).select().single();
    if(error){ alert(error.message); return; }
    const rows = [...selectedUserIds, currentUser.id].map(uid => ({ chat_id: chat.id, user_id: uid }));
    await sb.from('chat_participant').insert(rows);
    hide($('new-chat-modal'));
    loadChats();
    openChat(chat.id);
  }
};

async function findExistingDirectChat(otherId){
  const { data: myChats } = await sb.from('chat_participant').select('chat_id').eq('user_id', currentUser.id);
  if(!myChats) return null;
  const myChatIds = myChats.map(r => r.chat_id);
  const { data: theirChats } = await sb.from('chat_participant').select('chat_id').eq('user_id', otherId).in('chat_id', myChatIds);
  if(!theirChats) return null;
  for(const row of theirChats){
    const { data: chatData } = await sb.from('chats').select('is_group').eq('id', row.chat_id).single();
    if(chatData && !chatData.is_group) return row.chat_id;
  }
  return null;
}

/* ================= CHAT VIEW ================= */
$('btn-back').onclick = () => {
  $('chat-view').classList.remove('active');
  show($('list-view'));
  if(msgChannel) sb.removeChannel(msgChannel);
  activeChatId = null;
};

let activeChatIsGroup = false;
let activeChatCreatedBy = null;

async function openChat(chatId){
  activeChatId = chatId;
  const { data: chat } = await sb.from('chats').select('*').eq('id', chatId).single();
  activeChatMeta = await getChatDisplayMeta(chat);
  activeChatIsGroup = chat.is_group;
  activeChatCreatedBy = chat.created_by;
  $('chat-header-name').textContent = activeChatMeta.name;
  $('chat-header-avatar').innerHTML = activeChatMeta.avatarUrl ? `<img src="${activeChatMeta.avatarUrl}">` : initials(activeChatMeta.name);

  if(activeChatIsGroup && activeChatCreatedBy === currentUser.id){
    $('btn-add-people').style.display = 'flex';
  } else {
    $('btn-add-people').style.display = 'none';
  }

  hide($('list-view'));
  $('chat-view').classList.add('active');
  $('msgs').innerHTML = '';

  await loadMessages(chatId);

  if(msgChannel) sb.removeChannel(msgChannel);
  msgChannel = sb.channel('messages-' + chatId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${chatId}` }, (payload) => {
      appendMessage(payload.new, true);
    })
    .subscribe();
}

async function loadMessages(chatId){
  const { data: messages } = await sb
    .from('messages')
    .select('*')
    .eq('chat_id', chatId)
    .order('created_at', { ascending: true });
  if(messages){
    for(const m of messages){
      await appendMessage(m, false);
    }
  }
  scrollToBottom();
}

const senderNameCache = {};
async function getSenderName(senderId){
  if(senderNameCache[senderId]) return senderNameCache[senderId];
  const { data } = await sb.from('profiles').select('username').eq('id', senderId).single();
  const name = data?.username || 'User';
  senderNameCache[senderId] = name;
  return name;
}

async function appendMessage(m, scroll){
  const isMe = m.sender_id === currentUser.id;
  let bodyHtml = '';
  if(m.type === 'image'){
    bodyHtml = `<img src="${m.media_url}" />`;
  } else if(m.type === 'voice'){
    bodyHtml = `<audio controls src="${m.media_url}"></audio>`;
  } else {
    bodyHtml = escapeHtml(m.content || '');
  }

  let senderLabel = '';
  if(!isMe && activeChatMeta && activeChatMeta.name && document.querySelectorAll('.modal-tab.active')[0]?.dataset.mode !== 'direct'){
    // show sender name in groups
    const name = await getSenderName(m.sender_id);
    senderLabel = `<div class="msg-sender">${escapeHtml(name)}</div>`;
  }

  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMe ? 'me' : 'them');
  row.innerHTML = `<div class="bubble">${senderLabel}${bodyHtml}</div>`;
  $('msgs').appendChild(row);
  if(scroll) scrollToBottom();
}

function scrollToBottom(){
  const el = $('msgs');
  el.scrollTop = el.scrollHeight;
}

$('btn-send').onclick = sendTextMessage;
$('msg-input').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') sendTextMessage();
});

async function sendTextMessage(){
  const content = $('msg-input').value.trim();
  if(!content || !activeChatId) return;
  $('msg-input').value = '';
  const { error } = await sb.from('messages').insert({
    chat_id: activeChatId, sender_id: currentUser.id, content: content, type: 'text'
  });
  if(error) alert(error.message);
}

/* ---- Photo sharing ---- */
$('btn-attach').onclick = () => $('file-input').click();
$('file-input').onchange = async (e) => {
  const file = e.target.files[0];
  if(!file || !activeChatId) return;
  const path = `${activeChatId}/${Date.now()}_${file.name}`;
  const { error: uploadError } = await sb.storage.from('chat-media').upload(path, file);
  if(uploadError){ alert(uploadError.message); return; }
  const { data: urlData } = sb.storage.from('chat-media').getPublicUrl(path);
  await sb.from('messages').insert({
    chat_id: activeChatId, sender_id: currentUser.id, media_url: urlData.publicUrl, type: 'image'
  });
  e.target.value = '';
};

/* ---- Voice notes ---- */
$('btn-mic').onclick = async () => {
  if(mediaRecorder && mediaRecorder.state === 'recording'){
    mediaRecorder.stop();
    $('btn-mic').classList.remove('recording');
    return;
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      const blob = new Blob(recordedChunks, { type: 'audio/webm' });
      const path = `${activeChatId}/voice_${Date.now()}.webm`;
      const { error: uploadError } = await sb.storage.from('chat-media').upload(path, blob);
      if(uploadError){ alert(uploadError.message); return; }
      const { data: urlData } = sb.storage.from('chat-media').getPublicUrl(path);
      await sb.from('messages').insert({
        chat_id: activeChatId, sender_id: currentUser.id, media_url: urlData.publicUrl, type: 'voice'
      });
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    $('btn-mic').classList.add('recording');
  } catch(err){
    alert('Microphone access is needed to record a voice note.');
  }
};

let addPeopleSelectedIds = new Set();

$('btn-add-people').onclick = async () => {
  addPeopleSelectedIds.clear();
  $('add-people-search').value = '';
  $('add-people-results').innerHTML = '';
  show($('add-people-modal'));
};
$('close-add-people').onclick = () => hide($('add-people-modal'));

let addPeopleSearchTimeout;
$('add-people-search').oninput = () => {
  clearTimeout(addPeopleSearchTimeout);
  addPeopleSearchTimeout = setTimeout(searchUsersToAdd, 300);
};

async function searchUsersToAdd(){
  const term = $('add-people-search').value.trim();
  if(!term){ $('add-people-results').innerHTML=''; return; }

  const { data: existing } = await sb.from('chat_participant').select('user_id').eq('chat_id', activeChatId);
  const existingIds = new Set((existing || []).map(r => r.user_id));

  const { data: users } = await sb
    .from('profiles')
    .select('id, username, avatar_url')
    .ilike('username', `%${term}%`)
    .neq('id', currentUser.id)
    .limit(15);

  const filtered = (users || []).filter(u => !existingIds.has(u.id));

  if(filtered.length === 0){
    $('add-people-results').innerHTML = `<div class="empty-state" style="padding:20px;">No new users found.</div>`;
    return;
  }

  $('add-people-results').innerHTML = filtered.map(u => `
    <div class="user-pick-row ${addPeopleSelectedIds.has(u.id) ? 'selected' : ''}" data-user-id="${u.id}">
      <div class="avatar">${u.avatar_url ? `<img src="${u.avatar_url}">` : initials(u.username)}</div>
      <div class="chat-name">${escapeHtml(u.username)}</div>
    </div>
  `).join('');

  document.querySelectorAll('#add-people-results .user-pick-row').forEach(row => {
    row.onclick = () => {
      const uid = row.dataset.userId;
      if(addPeopleSelectedIds.has(uid)){
        addPeopleSelectedIds.delete(uid);
        row.classList.remove('selected');
      } else {
        addPeopleSelectedIds.add(uid);
        row.classList.add('selected');
      }
    };
  });
}

$('btn-confirm-add-people').onclick = async () => {
  if(addPeopleSelectedIds.size === 0){
    alert('Pick at least one person to add.');
    return;
  }
  const rows = [...addPeopleSelectedIds].map(uid => ({ chat_id: activeChatId, user_id: uid }));
  const { error } = await sb.from('chat_participant').insert(rows);
  if(error){ alert(error.message); return; }
  hide($('add-people-modal'));
  alert('People added to the group.');
};
